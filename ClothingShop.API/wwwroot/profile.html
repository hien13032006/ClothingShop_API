<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi - Clothing</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="profile-wrapper">
        <header class="profile-header">
            <a href="index.html" class="logo-link">
                <span class="brand-name">Clothing</span>
            </a>
            <span class="page-sub-title">Quản lý tài khoản</span>
        </header>

        <main class="profile-content">
            <div class="profile-sidebar">
                <div class="avatar-placeholder">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>

            <section class="profile-main">
                <h2>Hồ sơ của tôi</h2>
                <form id="profile-form">
                    <div class="form-row">
                        <label>Email tài khoản</label>
                        <span class="info-static" id="profile-email">đang tải...</span>
                    </div>

                    <div class="form-row">
                        <label>Họ và tên</label>
                        <input type="text" id="fullname" placeholder="Nhập họ và tên của bạn">
                    </div>

                    <div class="form-row">
                        <label>Số điện thoại</label>
                        <input type="text" id="phone" placeholder="Nhập số điện thoại">
                    </div>

                    <div class="form-row">
                        <label>Hạng thành viên</label>
                        <span class="info-badge" id="membership-level" style="background: #ffa502; color: white; padding: 3px 10px; border-radius: 20px; font-weight: bold; font-size: 13px;">Bạc</span>
                    </div>

                    <div class="form-row">
                        <label>Điểm tích lũy</label>
                        <span class="info-static" id="total-points" style="font-weight: bold; color: #2ed573;">0 điểm</span>
                    </div>

                    <div class="form-row">
                        <label>Ngày tham gia</label>
                        <span class="info-static" id="created-at" style="color: #747d8c;">--/--/----</span>
                    </div>

                    <button type="submit" class="btn-save">Lưu thay đổi</button>
                </form>

                <div class="address-section">
                    <div class="address-header-box">
                        <h3>Địa chỉ của tôi</h3>
                        <button type="button" class="btn-add-address" onclick="openAddressModal()">
                            <i class="fa-solid fa-plus"></i> Thêm địa chỉ mới
                        </button>
                    </div>

                    <div id="address-list-container">
                        <p style="color: #888; padding: 10px 0;">Đang tải danh sách địa chỉ...</p>
                    </div>
                </div>
            </section>

            <div id="address-modal" class="modal-overlay">
                <div class="modal-box">
                    <h3>Địa chỉ mới</h3>
                    <form id="address-form">
                        <div class="modal-form-group">
                            <input type="text" id="receiver-name" placeholder="Họ và tên người nhận" required>
                        </div>
                        <div class="modal-form-group">
                            <input type="text" id="receiver-phone" placeholder="Số điện thoại" required>
                        </div>
                        <div class="modal-form-group">
                            <textarea id="address-detail" placeholder="Địa chỉ chi tiết (Số nhà, tên đường, phường/xã, quận/huyện...)" required></textarea>
                        </div>
                        <div class="modal-form-group">
                            <label class="radio-label-title">Loại địa chỉ:</label>
                            <div class="radio-options">
                                <label><input type="radio" name="address-type" value="Nhà riêng" checked> Nhà riêng</label>
                                <label><input type="radio" name="address-type" value="Văn phòng"> Văn phòng</label>
                            </div>
                        </div>
                        <div class="modal-form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="is-default"> Đặt làm địa chỉ mặc định
                            </label>
                        </div>
                        <div class="modal-actions-footer">
                            <button type="button" class="btn-modal-close" onclick="closeAddressModal()">Hủy</button>
                            <button type="submit" class="btn-modal-submit">Hoàn thành</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!--Footer-->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-col">
                <h1 class="footer-logo">Clothing</h1>
                <p class="footer-slogan">Shop áo quần online</p>
            </div>

            <div class="footer-col">
                <ul class="footer-links">
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Giới thiệu</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Liên hệ</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Tin tức</a></li>
                </ul>
            </div>

            <div class="footer-col">
                <ul class="footer-links">
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Hướng dẫn</a></li>
                    <li><a href="#"><i class="fa-solid fa-angles-right"></i> Hỗ trợ khách hàng</a></li>
                </ul>
                <div class="footer-socials">
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="profile.js"></script>
</body>
</html>
